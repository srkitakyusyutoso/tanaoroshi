<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>品番スキャナー</title>
<style>
  :root{--bg:#14181d;--panel:#1e252d;--line:#333d48;--text:#e8edf2;--sub:#8a97a5;--ok:#35c66b;--accent:#ffb020;--err:#ff5c5c}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;display:flex;flex-direction:column}
  header{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:10px}
  header h1{font-size:16px;font-weight:700;letter-spacing:.08em}
  header .status{font-size:12px;color:var(--sub)}
  #shootArea{padding:16px}
  #shootBtn{display:block;width:100%;padding:24px 0;font-size:20px;font-weight:700;letter-spacing:.1em;color:#14181d;background:var(--accent);border:none;border-radius:12px;font-family:inherit}
  #shootBtn:active{transform:scale(.98)}
  #shootBtn:disabled{background:#6b5a2a;color:#3a3a3a}
  #fileInput{display:none}
  #flash{position:fixed;inset:0;background:var(--ok);opacity:0;pointer-events:none;transition:opacity .25s;z-index:50}
  #flash.on{opacity:.55;transition:none}
  #result{padding:16px;text-align:center;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--panel)}
  #result .label{font-size:11px;color:var(--sub);letter-spacing:.2em;margin-bottom:4px}
  #hinban{font-family:"SF Mono","Roboto Mono",Consolas,monospace;font-size:clamp(20px,6vw,30px);font-weight:700;letter-spacing:.04em;word-break:break-all;min-height:1.3em}
  #hinban.ok{color:var(--ok)}
  #hinban.err{color:var(--err);font-size:15px;font-weight:400}
  #hinban.busy{color:var(--sub);font-size:17px;font-weight:400}
<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbzE55x-ubKz4K-UShmCSlLJODRxFBAjCQRzjt5FiUn1Ni8kCU7ndlZQ5l7jH5wF5eJx/exec';
function extractHinban(raw){if(raw.length>=76){var f=raw.substring(36,76).trim();if(f)return f}var p=raw.trim().split(/\s+/);return p.length>=2?p[1]:raw.trim()}
var shootBtn=document.getElementById('shootBtn'),fileInput=document.getElementById('fileInput'),hinbanEl=document.getElementById('hinban'),stateEl=document.getElementById('sendState'),histEl=document.getElementById('histList'),engineEl=document.getElementById('engineStatus'),qtyArea=document.getElementById('qtyArea'),qtyInput=document.getElementById('qtyInput'),recordBtn=document.getElementById('recordBtn'),masterInfo=document.getElementById('masterInfo'),mSyasyu=document.getElementById('mSyasyu'),mHinmei=document.getElementById('mHinmei'),pending=null;
var READ_OPTS={formats:['QRCode'],tryHarder:true,tryRotate:true,tryInvert:true,maxNumberOfSymbols:1};
function feedback(){if(navigator.vibrate)navigator.vibrate(120);try{var c=new(window.AudioContext||window.webkitAudioContext)();var o=c.createOscillator();var g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=1400;g.gain.setValueAtTime(.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.18);o.start();o.stop(c.currentTime+.18)}catch(e){}var f=document.getElementById('flash');f.classList.add('on');setTimeout(function(){f.classList.remove('on')},60)}
ZXingWASM.prepareZXingModule({fireImmediately:true}).then(function(){engineEl.textContent='準備完了';shootBtn.disabled=false}).catch(function(){engineEl.textContent='準備完了';shootBtn.disabled=false});
function preprocess(bitmap,maxSide,k){var scale=Math.min(1,maxSide/Math.max(bitmap.width,bitmap.height));var w=Math.round(bitmap.width*scale),h=Math.round(bitmap.height*scale);var canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;var ctx=canvas.getContext('2d');ctx.drawImage(bitmap,0,0,w,h);var imgData=ctx.getImageData(0,0,w,h),d=imgData.data;for(var i=0;i<w*h;i++){var gray=(d[i*4]*299+d[i*4+1]*587+d[i*4+2]*114)/1000;var v=Math.max(0,Math.min(255,(gray-128)*k+128));d[i*4]=d[i*4+1]=d[i*4+2]=v}return imgData}
function decodePhoto(file){return ZXingWASM.readBarcodes(file,READ_OPTS).then(function(r){if(r.length&&r[0].text)return r[0].text;return createImageBitmap(file).then(function(bitmap){var plans=[[1600,1.5],[2400,2.0],[3200,1.5]];function tryNext(idx){if(idx>=plans.length){bitmap.close();return null}return ZXingWASM.readBarcodes(preprocess(bitmap,plans[idx][0],plans[idx][1]),READ_OPTS).then(function(r2){if(r2.length&&r2[0].text){bitmap.close();return r2[0].text}return tryNext(idx+1)}).catch(function(){return tryNext(idx+1)})}return tryNext(0)})}).catch(function(){return null})}
function getQty(){var n=parseInt(qtyInput.value,10);return(isNaN(n)||n<0)?null:n}
document.getElementById('qtyPlus').addEventListener('click',function(){qtyInput.value=String((getQty()||0)+1)});
document.getElementById('qtyMinus').addEventListener('click',function(){qtyInput.value=String(Math.max(0,(getQty()||0)-1))});
qtyInput.addEventListener('input',function(){qtyInput.value=qtyInput.value.replace(/[０-９]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-65248)}).replace(/[^0-9]/g,'')});
shootBtn.addEventListener('click',function(){fileInput.click()});
fileInput.addEventListener('change',function(){var file=fileInput.files[0];fileInput.value='';if(!file)return;shootBtn.disabled=true;pending=null;qtyArea.classList.remove('show');masterInfo.classList.remove('show');hinbanEl.textContent='解析中…';hinbanEl.className='busy';stateEl.textContent='';stateEl.className='';decodePhoto(file).then(function(raw){shootBtn.disabled=false;if(!raw){hinbanEl.textContent='読み取れませんでした。QRコードに近づいて撮影し直してください。';hinbanEl.className='err';return}var hinban=extractHinban(raw);feedback();pending={hinban:hinban,raw:raw};hinbanEl.textContent=hinban;hinbanEl.className='ok';stateEl.textContent='数量を入力して「記録する」を押してください';qtyInput.value='';qtyArea.classList.add('show');setTimeout(function(){qtyInput.focus()},100)})});
recordBtn.addEventListener('click',function(){if(!pending)return;var qty=getQty();if(qty===null||qtyInput.value===''){stateEl.textContent='数量を入力してください';stateEl.className='err';qtyInput.focus();return}recordBtn.disabled=true;stateEl.textContent='記録中…';stateEl.className='';var s=pending;fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'scanAndRecord',hinban:s.hinban,suryo:qty,rawData:s.raw})}).then(function(res){return res.json()}).then(function(data){recordBtn.disabled=false;if(data.error){stateEl.textContent='エラー: '+data.error;stateEl.className='err';return}if(data.syasyu||data.hinmei){mSyasyu.textContent=data.syasyu||'—';mHinmei.textContent=data.hinmei||'—';masterInfo.classList.add('show')}stateEl.textContent='✓ 記録しました ('+data.time+')';stateEl.className='ok';addHistory(data.hinban,data.syasyu,data.hinmei,data.suryo,data.time);pending=null;qtyArea.classList.remove('show');qtyInput.blur()}).catch(function(err){recordBtn.disabled=false;stateEl.textContent='通信エラー: '+String(err);stateEl.className='err'})});
function addHistory(hinban,syasyu,hinmei,suryo,time){var div=document.createElement('div');div.className='hist-item';var top=document.createElement('div');top.className='hist-top';top.innerHTML='<span class="h"></span><span class="q"></span><span class="t"></span>';top.children[0].textContent=hinban;top.children[1].textContent='×'+suryo;top.children[2].textContent=time;div.appendChild(top);if(syasyu||hinmei){var sub=document.createElement('div');sub.className='hist-sub';sub.textContent=[syasyu,hinmei].filter(Boolean).join(' / ');div.appendChild(sub)}histEl.prepend(div);while(histEl.children.length>30)histEl.removeChild(histEl.lastChild)}
</script>
</body>
</html>
