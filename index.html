<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>品番スキャナー</title>
<style>
  :root {
    --bg: #14181d;
    --panel: #1e252d;
    --line: #333d48;
    --text: #e8edf2;
    --sub: #8a97a5;
    --ok: #35c66b;
    --accent: #ffb020;
    --err: #ff5c5c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: .08em; }
  header .status { font-size: 12px; color: var(--sub); }

  /* 撮影ボタン */
  #shootArea { padding: 20px 16px; }
  #shootBtn {
    display: block;
    width: 100%;
    padding: 26px 0;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: .1em;
    color: #14181d;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    font-family: inherit;
  }
  #shootBtn:active { transform: scale(.98); }
  #shootBtn:disabled { background: #6b5a2a; color: #3a3a3a; }
  #fileInput { display: none; }

  /* 成功フラッシュ */
  #flash {
    position: fixed;
    inset: 0;
    background: var(--ok);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    z-index: 50;
  }
  #flash.on { opacity: .55; transition: none; }

  /* 結果表示 */
  #result {
    padding: 20px 16px;
    text-align: center;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  #result .label { font-size: 11px; color: var(--sub); letter-spacing: .2em; margin-bottom: 6px; }
  #hinban {
    font-family: "SF Mono", "Roboto Mono", Consolas, monospace;
    font-size: clamp(22px, 7vw, 34px);
    font-weight: 700;
    letter-spacing: .04em;
    word-break: break-all;
    min-height: 1.3em;
  }
  #hinban.ok  { color: var(--ok); }
  #hinban.err { color: var(--err); font-size: 16px; font-weight: 400; }
  #hinban.busy { color: var(--sub); font-size: 18px; font-weight: 400; }
  #sendState { font-size: 12px; margin-top: 8px; color: var(--sub); min-height: 1.2em; }
  #sendState.ok { color: var(--ok); }
  #sendState.err { color: var(--err); }

  /* 履歴 */
  #history { flex: 1; overflow-y: auto; padding: 10px 16px 24px; }
  #history h2 { font-size: 11px; color: var(--sub); letter-spacing: .2em; margin: 8px 0; }
  .hist-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    font-family: "SF Mono", "Roboto Mono", Consolas, monospace;
    font-size: 14px;
  }
  .hist-item .t { color: var(--sub); font-size: 12px; }
</style>
</head>
<body>

<div id="flash"></div>

<header>
  <h1>品番スキャナー</h1>
  <span class="status" id="engineStatus">準備中…</span>
</header>

<div id="shootArea">
  <button id="shootBtn" disabled>📷 QRを撮影する</button>
  <input type="file" id="fileInput" accept="image/*" capture="environment">
</div>

<div id="result">
  <div class="label">品 番</div>
  <div id="hinban">ボタンを押してQRコードを撮影してください</div>
  <div id="sendState"></div>
</div>

<div id="history">
  <h2>このセッションの記録</h2>
  <div id="histList"></div>
</div>

<!-- QRデコードエンジン(ZXing C++のWebAssembly版) -->
<script src="https://cdn.jsdelivr.net/npm/zxing-wasm@3.1.0/dist/iife/reader/index.js"></script>
<script>
  // ================= 品番の切り出しロジック =================
  // QRデータ構造(固定長):
  //   0-35文字目 : システム名/会社名 (例: sakaeriken)
  //   36-75文字目: 品番              (例: 75742-B2110-E0/TM00)
  //   76文字目以降: 管理番号・発行日時 等
  function extractHinban(raw) {
    if (raw.length >= 76) {
      const fixed = raw.substring(36, 76).trim();
      if (fixed) return fixed;
    }
    const parts = raw.trim().split(/\s+/);
    if (parts.length >= 2) return parts[1];
    return raw.trim();
  }

  // ================= UI要素 =================
  const shootBtn  = document.getElementById('shootBtn');
  const fileInput = document.getElementById('fileInput');
  const hinbanEl  = document.getElementById('hinban');
  const stateEl   = document.getElementById('sendState');
  const histEl    = document.getElementById('histList');
  const engineEl  = document.getElementById('engineStatus');

  // ================= 効果音・振動・フラッシュ =================
  function feedback() {
    if (navigator.vibrate) navigator.vibrate(120);
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 1400;
      gain.gain.setValueAtTime(0.25, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
      osc.start(); osc.stop(ctx.currentTime + 0.18);
    } catch (e) {}
    const f = document.getElementById('flash');
    f.classList.add('on');
    setTimeout(() => f.classList.remove('on'), 60);
  }

  // ================= QRデコードエンジン初期化 =================
  const READ_OPTS = { formats: ['QRCode'], tryHarder: true, tryRotate: true, tryInvert: true, maxNumberOfSymbols: 1 };

  // WASMを先読みしてボタンを有効化
  ZXingWASM.prepareZXingModule({ fireImmediately: true })
    .then(() => {
      engineEl.textContent = '準備完了';
      shootBtn.disabled = false;
    })
    .catch(() => {
      // 先読みに失敗しても撮影時に再試行されるので有効化はする
      engineEl.textContent = '準備完了';
      shootBtn.disabled = false;
    });

  // ================= 画像前処理(グレースケール+コントラスト) =================
  function preprocess(bitmap, maxSide, k) {
    const scale = Math.min(1, maxSide / Math.max(bitmap.width, bitmap.height));
    const w = Math.round(bitmap.width * scale);
    const h = Math.round(bitmap.height * scale);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bitmap, 0, 0, w, h);
    const imgData = ctx.getImageData(0, 0, w, h);
    const d = imgData.data;
    for (let i = 0; i < w * h; i++) {
      const gray = (d[i*4]*299 + d[i*4+1]*587 + d[i*4+2]*114) / 1000;
      const v = Math.max(0, Math.min(255, (gray - 128) * k + 128));
      d[i*4] = d[i*4+1] = d[i*4+2] = v;
    }
    return imgData;
  }

  // ================= 多段デコード =================
  async function decodePhoto(file) {
    // 1) まずは写真そのままで試す(近接撮影ならこれで即決)
    try {
      const r = await ZXingWASM.readBarcodes(file, READ_OPTS);
      if (r.length && r[0].text) return r[0].text;
    } catch (e) {}

    // 2) 前処理を変えながら再試行(遠め・斜めの写真対策)
    const bitmap = await createImageBitmap(file);
    const plans = [[1600, 1.5], [2400, 2.0], [3200, 1.5]];
    for (const [maxSide, k] of plans) {
      try {
        const r = await ZXingWASM.readBarcodes(preprocess(bitmap, maxSide, k), READ_OPTS);
        if (r.length && r[0].text) { bitmap.close(); return r[0].text; }
      } catch (e) {}
    }
    bitmap.close();
    return null;
  }

  // ================= メインフロー =================
  shootBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    fileInput.value = ''; // 同じ操作を繰り返せるようリセット
    if (!file) return;

    shootBtn.disabled = true;
    hinbanEl.textContent = '解析中…';
    hinbanEl.className = 'busy';
    stateEl.textContent = '';
    stateEl.className = '';

    const raw = await decodePhoto(file);
    shootBtn.disabled = false;

    if (!raw) {
      hinbanEl.textContent = '読み取れませんでした。QRコードに近づいて、画面いっぱいに写るように撮影し直してください。';
      hinbanEl.className = 'err';
      return;
    }

    const hinban = extractHinban(raw);
    feedback();
    hinbanEl.textContent = hinban;
    hinbanEl.className = 'ok';
    stateEl.textContent = '記録中…';

    google.script.run
      .withSuccessHandler(res => {
        stateEl.textContent = '✓ 記録しました (' + res.time + ')';
        stateEl.className = 'ok';
        addHistory(res.hinban, res.time);
      })
      .withFailureHandler(() => {
        stateEl.textContent = '記録に失敗しました。電波状況を確認して、もう一度撮影してください。';
        stateEl.className = 'err';
      })
      .recordScan(hinban, raw);
  });

  function addHistory(hinban, time) {
    const div = document.createElement('div');
    div.className = 'hist-item';
    div.innerHTML = '<span></span><span class="t"></span>';
    div.children[0].textContent = hinban;
    div.children[1].textContent = time;
    histEl.prepend(div);
    while (histEl.children.length > 20) histEl.removeChild(histEl.lastChild);
  }
</script>
</body>
</html>
